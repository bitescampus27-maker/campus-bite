<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Campus Bites</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;margin:0;padding:0;}

body{
font-family:Inter,sans-serif;
background:
linear-gradient(rgba(255,255,255,0.85), rgba(255,255,255,0.85)),
url("https://images.unsplash.com/photo-1540189549336-e6e99c3679fe?q=60&w=1200");
background-size:cover;
background-position:center;
background-attachment:scroll;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:10px;
}

.dashboard{
width:100%;
max-width:900px;
padding:20px;
background:#ffffff;
border-radius:12px;
box-shadow:0 5px 20px rgba(0,0,0,.1);
}

h1{
text-align:center;
color:#ff5722;
margin-bottom:20px;
font-size:22px;
}

.controls{
text-align:center;
margin-bottom:20px;
}

select{
padding:10px;
border-radius:10px;
border:1px solid #ccc;
font-size:15px;
width:100%;
max-width:250px;
}

.empty-state{
text-align:center;
padding:30px;
color:#777;
}

.grid{
display:none;
grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
gap:15px;
}

.card{
height:150px;
border-radius:12px;
overflow:hidden;
cursor:pointer;
position:relative;
box-shadow:0 5px 15px rgba(0,0,0,.1);
}

.card img{
width:100%;
height:100%;
object-fit:cover;
}

.overlay{
position:absolute;
bottom:0;
width:100%;
padding:8px;
background:rgba(0,0,0,0.6);
color:#fff;
font-size:14px;
text-align:center;
}

.status{
position:absolute;
top:8px;
right:8px;
padding:4px 8px;
border-radius:8px;
font-size:12px;
color:#fff;
}

.open{background:#4caf50;}
.closed{background:#f44336;}

.card.closed{
opacity:0.5;
pointer-events:none;
}
</style>
</head>

<body>

<div class="dashboard">
<h1>Campus Bites</h1>

<div class="controls">
<select id="collegeSelect">
<option value="">🎓 Select Your College</option>
<option value="SRIMT">🏫 SRIMT</option>
</select>
</div>

<div class="empty-state" id="emptyState">
<h3>Choose Your College</h3>
<p>Select your college to view canteens</p>
</div>

<div class="grid" id="grid">

<div class="card" data-colleges="SRIMT" data-id="nescafe" data-link="https://campusbitesnescafe.vercel.app">
<img src="https://images.unsplash.com/photo-1511920170033-f8396924c348?q=60&w=400">
<div class="overlay">☕ Nescafe</div>
</div>

<div class="card" data-colleges="SRIMT" data-id="rahul" data-link="https://campusbitessingh-cafe.vercel.app">
<img src="https://images.unsplash.com/photo-1550547660-d9450f859349?q=60&w=400">
<div class="overlay">🍽️ Singh Cafe</div>
</div>

<div class="card" data-colleges="SRIMT" data-id="foodcourt" data-link="https://campusbitesfoodcourt.vercel.app">
<img src="https://images.unsplash.com/photo-1600891964599-f61ba0e24092?q=60&w=400">
<div class="overlay">🍕 Food Court</div>
</div>

<div class="card" data-colleges="SRIMT" data-id="onepour" data-link="https://campusbitesone-pour.vercel.app">
<img src="https://images.unsplash.com/photo-1551024709-8f23befc6f87?q=60&w=400">
<div class="overlay">🍹 One Pour</div>
</div>

</div>
</div>

<script>
const cards = document.querySelectorAll(".card");
const select = document.getElementById("collegeSelect");
const grid = document.getElementById("grid");
const empty = document.getElementById("emptyState");

let kitchenStatus = JSON.parse(localStorage.getItem("kitchenStatus")) || {
  nescafe:true,
  rahul:true,
  foodcourt:true,
  onepour:true
};

function applyStatus(){
  cards.forEach(card=>{
    const id = card.dataset.id;
    const open = kitchenStatus[id];

    let badge = card.querySelector(".status");
    if(!badge){
      badge = document.createElement("div");
      badge.className="status";
      card.appendChild(badge);
    }

    card.classList.remove("closed");

    if(open){
      badge.textContent="🟢 Open";
      badge.className="status open";
    }else{
      badge.textContent="🔴 Closed";
      badge.className="status closed";
      card.classList.add("closed");
    }
  });
}

select.addEventListener("change", ()=>{
  if(!select.value){
    grid.style.display="none";
    empty.style.display="block";
  }else{
    grid.style.display="grid";
    empty.style.display="none";
  }
});

cards.forEach(card=>{
  card.onclick=()=>{
    if(card.classList.contains("closed")){
      alert("Kitchen is closed ❌");
      return;
    }
    window.location.href = card.dataset.link;
  }
});

window.addEventListener("storage", ()=>{
  const updated = JSON.parse(localStorage.getItem("kitchenStatus"));
  if(updated){
    kitchenStatus = updated;
    applyStatus();
  }
});

applyStatus();
</script>

</body>
</html>
